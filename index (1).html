<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio-X | Thinking Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #12384C;
    --teal: #79BFA8;
    --soft-cyan: #A7D6CF;
    --gold: #AE953B;
    --bg: #F5F7F8;
    --border: #E2E8EF;
    --body: #1a1a1a;
    --muted: #64748B;
    --white: #ffffff;
    --ann-blue: #163F9A;
    --orange: #D47A2A;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--body);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--navy);
    padding: 0 1.5rem;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    color: var(--white);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-accent { color: var(--teal); }
  .header-sub { color: var(--soft-cyan); font-size: 12px; }

  /* API Key Bar */
  #api-bar {
    background: #fff8e6;
    border-bottom: 1px solid #f0d88a;
    padding: 8px 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #api-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  #api-key-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: monospace;
    background: var(--white);
    max-width: 420px;
  }
  #api-key-input:focus { outline: 2px solid var(--teal); }
  .save-btn {
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
  }
  .save-btn:hover { background: #5fa898; }
  #api-status { font-size: 12px; color: var(--muted); }

  /* Main Layout */
  .main {
    display: grid;
    grid-template-columns: 260px 1fr 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* Pane共通 */
  .pane {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane:last-child { border-right: none; }
  .pane-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .pane-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pane-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  /* Left Pane - Inbox */
  .memo-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .memo-card:hover { border-color: var(--teal); box-shadow: 0 1px 4px rgba(121,191,168,0.15); }
  .memo-card.active { border-color: var(--teal); border-width: 2px; background: #f0faf7; }
  .memo-card-title { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .memo-card-preview { font-size: 11px; color: var(--muted); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .memo-card-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .memo-date { font-size: 10px; color: #aaa; }
  .memo-fire { font-size: 11px; }
  .delete-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
  }
  .delete-btn:hover { color: #e74c3c; }
  .new-memo-btn {
    width: 100%;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 9px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s;
  }
  .new-memo-btn:hover { background: #1a4d65; }

  /* Center Pane - Workbench */
  .workbench-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; }
  textarea#memo-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    resize: vertical;
    min-height: 140px;
    color: var(--body);
    line-height: 1.7;
    background: var(--white);
  }
  textarea#memo-input:focus { outline: 2px solid var(--teal); border-color: transparent; }

  .control-section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .control-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  /* Sliders */
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .slider-name { font-size: 11px; color: var(--muted); width: 44px; flex-shrink: 0; }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--teal);
    height: 4px;
    cursor: pointer;
  }
  .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: -4px; margin-bottom: 6px; }

  /* Format selector */
  .format-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .format-btn {
    border: 1px solid var(--border);
    background: var(--white);
    border-radius: 6px;
    padding: 7px 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.15s;
    text-align: center;
  }
  .format-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .format-btn:hover:not(.active) { border-color: var(--teal); color: var(--navy); }

  /* Structure selector */
  .struct-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .struct-btn {
    border: 1px solid var(--border);
    background: var(--white);
    border-radius: 6px;
    padding: 7px 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.15s;
    text-align: center;
  }
  .struct-btn.active { background: var(--teal); color: var(--white); border-color: var(--teal); }
  .struct-btn:hover:not(.active) { border-color: var(--teal); color: var(--navy); }

  /* Convert Button */
  .convert-btn {
    width: 100%;
    background: var(--orange);
    color: var(--white);
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .convert-btn:hover { background: #b8661e; }
  .convert-btn:active { transform: scale(0.99); }
  .convert-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* Save memo btn */
  .save-memo-btn {
    width: 100%;
    background: var(--white);
    color: var(--navy);
    border: 1px solid var(--navy);
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .save-memo-btn:hover { background: var(--navy); color: var(--white); }

  /* Right Pane - Asset */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: none;
    padding: 10px 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--teal); }
  .tab-btn:hover:not(.active) { color: var(--navy); }

  .output-pane { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .output-pane.active { display: flex; }

  .output-frame {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
  }

  /* X Preview */
  .x-preview {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    max-width: 480px;
    margin: 0 auto;
  }
  .x-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--teal);
    display: flex; align-items: center; justify-content: center;
    color: var(--white); font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .x-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .x-name { font-size: 13px; font-weight: 700; }
  .x-handle { font-size: 12px; color: var(--muted); }
  .x-content { font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  .x-char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .x-char-count.over { color: #e74c3c; }

  /* Note Preview */
  .note-preview {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-size: 14px;
    line-height: 1.9;
  }
  .note-preview h1 { font-size: 18px; font-weight: 700; margin-bottom: 14px; color: var(--navy); }
  .note-preview h2 { font-size: 15px; font-weight: 700; margin: 14px 0 6px; color: var(--navy); }
  .note-preview p { margin-bottom: 10px; }

  /* Markdown Preview */
  .md-preview {
    background: #1e1e2e;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #cdd6f4;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Copy buttons */
  .copy-bar {
    padding: 10px 14px;
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }
  .copy-btn {
    flex: 1;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 6px;
    padding: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s;
  }
  .copy-btn:hover { background: #1a4d65; }
  .copy-btn.copied { background: var(--teal); }

  /* Loading */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(18,56,76,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    display: none;
  }
  .loading-box {
    background: var(--white);
    border-radius: 12px;
    padding: 28px 36px;
    text-align: center;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Empty state */
  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 100%; flex-direction: column; gap: 8px;
    color: var(--muted); font-size: 13px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-accent">◆</span> Studio-X <span style="color:var(--soft-cyan);font-weight:400;font-size:12px;margin-left:4px">Thinking Studio</span>
  </div>
  <div class="header-sub">混沌（メモ）を資産（アウトプット）へ</div>
</header>

<!-- API Key Bar -->
<div id="api-bar">
  <label>🔑 Claude API Key</label>
  <input type="password" id="api-key-input" placeholder="AIza..." />
  <button class="save-btn" onclick="saveApiKey()">保存</button>
  <span id="api-status">未設定</span>
</div>

<div class="main">

  <!-- LEFT: Inbox -->
  <div class="pane">
    <div class="pane-header">
      <span class="pane-title">📥 Inbox</span>
      <span style="font-size:10px;color:var(--muted)" id="memo-count">0件</span>
    </div>
    <div class="pane-body">
      <button class="new-memo-btn" onclick="newMemo()">＋ 新しいメモ</button>
      <div id="memo-list"></div>
    </div>
  </div>

  <!-- CENTER: Workbench -->
  <div class="pane" style="border-right:1px solid var(--border)">
    <div class="pane-header">
      <span class="pane-title">⚙️ Workbench</span>
    </div>
    <div class="workbench-body">
      <textarea id="memo-input" placeholder="思考・アイデア・気づきをここに入力...&#10;&#10;例）今日の商談で気づいたこと、読んだ記事の感想、伝えたいメッセージ"></textarea>

      <div class="control-section">
        <div class="control-label">📐 構造化フレームワーク</div>
        <div class="struct-grid">
          <button class="struct-btn active" onclick="selectStruct(this,'PREP')">PREP法</button>
          <button class="struct-btn" onclick="selectStruct(this,'SDS')">SDS法</button>
          <button class="struct-btn" onclick="selectStruct(this,'WHY')">WHY→HOW</button>
          <button class="struct-btn" onclick="selectStruct(this,'STAR')">STAR法</button>
          <button class="struct-btn" onclick="selectStruct(this,'問題解決')">問題解決型</button>
          <button class="struct-btn" onclick="selectStruct(this,'自由')">自由変換</button>
        </div>
      </div>

      <div class="control-section">
        <div class="control-label">🎛️ マジック・スライダー</div>
        <div class="slider-row">
          <span class="slider-name">トーン</span>
          <input type="range" id="tone" min="1" max="5" value="3" />
        </div>
        <div class="slider-labels"><span>丁寧</span><span>ラフ</span></div>
        <div class="slider-row">
          <span class="slider-name">粒度</span>
          <input type="range" id="length" min="1" max="5" value="3" />
        </div>
        <div class="slider-labels"><span>短い</span><span>長い</span></div>
      </div>

      <div class="control-section">
        <div class="control-label">📤 出力フォーマット</div>
        <div class="format-grid">
          <button class="format-btn active" onclick="selectFormat(this,'x')">X（ポスト）</button>
          <button class="format-btn" onclick="selectFormat(this,'note')">note記事</button>
          <button class="format-btn active" onclick="selectFormat(this,'md')">Markdown</button>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-top:6px">複数選択可</div>
      </div>

      <button class="save-memo-btn" onclick="saveMemo()">💾 メモを保存</button>
      <button class="convert-btn" onclick="convertMemo()" id="convert-btn">✦ 変換する</button>
    </div>
  </div>

  <!-- RIGHT: Asset -->
  <div class="pane" style="display:flex;flex-direction:column">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(this,'tab-x')">X</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-note')">note</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-md')">Markdown</button>
    </div>

    <!-- X tab -->
    <div id="tab-x" class="output-pane active">
      <div class="output-frame">
        <div class="x-preview" id="x-preview">
          <div class="empty-state">
            <div class="empty-icon">✦</div>
            <div>変換するとここに表示されます</div>
          </div>
        </div>
      </div>
      <div class="copy-bar">
        <button class="copy-btn" onclick="copyOutput('x')">📋 コピー</button>
      </div>
    </div>

    <!-- note tab -->
    <div id="tab-note" class="output-pane">
      <div class="output-frame">
        <div class="note-preview" id="note-preview">
          <div class="empty-state">
            <div class="empty-icon">✦</div>
            <div>変換するとここに表示されます</div>
          </div>
        </div>
      </div>
      <div class="copy-bar">
        <button class="copy-btn" onclick="copyOutput('note')">📋 コピー</button>
      </div>
    </div>

    <!-- Markdown tab -->
    <div id="tab-md" class="output-pane">
      <div class="output-frame">
        <div class="md-preview" id="md-preview">変換するとここに表示されます</div>
      </div>
      <div class="copy-bar">
        <button class="copy-btn" onclick="copyOutput('md')">📋 コピー</button>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">AIが変換中...</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ===== STATE =====
  let memos = JSON.parse(localStorage.getItem('sx-memos') || '[]');
  let currentMemoId = null;
  let selectedStruct = 'PREP';
  let selectedFormats = new Set(['x', 'md']);
  let outputs = { x: '', note: '', md: '' };

  // ===== API KEY =====
  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key.startsWith('AIza')) {
      showToast('❌ APIキーの形式が違います（AIza...で始まるもの）');
      return;
    }
    localStorage.setItem('sx-apikey', key);
    document.getElementById('api-status').textContent = '✅ 設定済み';
    document.getElementById('api-status').style.color = '#2e7d5e';
    showToast('✅ APIキーを保存しました');
  }

  function loadApiKey() {
    const key = localStorage.getItem('sx-apikey');
    if (key) {
      document.getElementById('api-key-input').value = key;
      document.getElementById('api-status').textContent = '✅ 設定済み';
      document.getElementById('api-status').style.color = '#2e7d5e';
    }
  }

  // ===== MEMO =====
  function newMemo() {
    currentMemoId = null;
    document.getElementById('memo-input').value = '';
    document.querySelectorAll('.memo-card').forEach(c => c.classList.remove('active'));
  }

  function saveMemo() {
    const text = document.getElementById('memo-input').value.trim();
    if (!text) { showToast('⚠️ メモが空です'); return; }
    const title = text.split('\n')[0].slice(0, 30) || '無題のメモ';
    const now = new Date();
    if (currentMemoId) {
      const idx = memos.findIndex(m => m.id === currentMemoId);
      if (idx > -1) { memos[idx].text = text; memos[idx].title = title; }
    } else {
      const memo = { id: Date.now().toString(), text, title, createdAt: now.toISOString() };
      memos.unshift(memo);
      currentMemoId = memo.id;
    }
    localStorage.setItem('sx-memos', JSON.stringify(memos));
    renderMemos();
    showToast('💾 保存しました');
  }

  function loadMemo(id) {
    const memo = memos.find(m => m.id === id);
    if (!memo) return;
    currentMemoId = id;
    document.getElementById('memo-input').value = memo.text;
    document.querySelectorAll('.memo-card').forEach(c => {
      c.classList.toggle('active', c.dataset.id === id);
    });
  }

  function deleteMemo(id, e) {
    e.stopPropagation();
    memos = memos.filter(m => m.id !== id);
    localStorage.setItem('sx-memos', JSON.stringify(memos));
    if (currentMemoId === id) { currentMemoId = null; document.getElementById('memo-input').value = ''; }
    renderMemos();
    showToast('🗑️ 削除しました');
  }

  function renderMemos() {
    const list = document.getElementById('memo-list');
    document.getElementById('memo-count').textContent = memos.length + '件';
    if (!memos.length) {
      list.innerHTML = '<div class="empty-state" style="height:auto;padding:20px 0"><div class="empty-icon">📝</div><div>メモがありません</div></div>';
      return;
    }
    const now = Date.now();
    list.innerHTML = memos.map(m => {
      const age = (now - new Date(m.createdAt).getTime()) / (1000 * 60 * 60 * 24);
      const fire = age > 7 ? '<span class="memo-fire" title="1週間放置中">🔥</span>' : '';
      const date = new Date(m.createdAt).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' });
      return `<div class="memo-card ${m.id === currentMemoId ? 'active' : ''}" data-id="${m.id}" onclick="loadMemo('${m.id}')">
        <button class="delete-btn" onclick="deleteMemo('${m.id}',event)">×</button>
        <div class="memo-card-title">${escHtml(m.title)}</div>
        <div class="memo-card-preview">${escHtml(m.text)}</div>
        <div class="memo-card-meta"><span class="memo-date">${date}</span>${fire}</div>
      </div>`;
    }).join('');
  }

  // ===== CONTROLS =====
  function selectStruct(btn, val) {
    document.querySelectorAll('.struct-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedStruct = val;
  }

  function selectFormat(btn, val) {
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) selectedFormats.add(val);
    else selectedFormats.delete(val);
  }

  function switchTab(btn, tabId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.output-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(tabId).classList.add('active');
  }

  // ===== CONVERT =====
  async function convertMemo() {
    const text = document.getElementById('memo-input').value.trim();
    if (!text) { showToast('⚠️ メモを入力してください'); return; }
    const apiKey = localStorage.getItem('sx-apikey');
    if (!apiKey) { showToast('❌ APIキーを設定してください'); return; }
    if (!selectedFormats.size) { showToast('⚠️ 出力フォーマットを選んでください'); return; }

    const tone = document.getElementById('tone').value;
    const length = document.getElementById('length').value;
    const toneLabel = ['とても丁寧', '丁寧', '普通', 'ややカジュアル', 'ラフ'][tone - 1];
    const lengthLabel = ['とても短く', '短め', '標準', '長め', 'とても長く'][length - 1];

    const formatsStr = [...selectedFormats].join('、');

    const prompt = `あなたは優秀なコンテンツ編集者です。以下のメモを構造化して複数のフォーマットに変換してください。

【元のメモ】
${text}

【設定】
- 構造化フレームワーク: ${selectedStruct}法
- トーン: ${toneLabel}
- 長さ: ${lengthLabel}
- 出力フォーマット: ${formatsStr}

以下のJSON形式のみで返してください（他のテキスト不要）:
{
  "x": "X(Twitter)用の投稿文（140文字以内）。不要なら空文字",
  "note": "note用の記事本文（Markdown形式、見出しあり）。不要なら空文字",
  "md": "Markdown形式の構造化メモ。不要なら空文字"
}

フォーマットが不要な場合は空文字("")を返してください。JSONのみ返し、コードブロック不要。`;

    showLoading(true);
    document.getElementById('convert-btn').disabled = true;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 2000 }
        })

      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || 'API Error');
      }

      const data = await res.json();
      const raw = data.candidates[0].content.parts[0].text.trim().replace(/```json|```/g, '');
      const parsed = JSON.parse(raw);

      outputs = { x: parsed.x || '', note: parsed.note || '', md: parsed.md || '' };
      renderOutputs();
      showToast('✅ 変換完了！');

    } catch (e) {
      showToast('❌ エラー: ' + e.message);
    } finally {
      showLoading(false);
      document.getElementById('convert-btn').disabled = false;
    }
  }

  function renderOutputs() {
    // X
    const xEl = document.getElementById('x-preview');
    if (outputs.x) {
      const count = [...outputs.x].length;
      const over = count > 140;
      xEl.innerHTML = `
        <div class="x-header">
          <div class="x-avatar">あ</div>
          <div><div class="x-name">あなた</div><div class="x-handle">@yourhandle</div></div>
        </div>
        <div class="x-content">${escHtml(outputs.x)}</div>
        <div class="x-char-count ${over ? 'over' : ''}">${count} / 140文字</div>
      `;
    } else {
      xEl.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div>X用の出力なし</div></div>';
    }

    // note
    const noteEl = document.getElementById('note-preview');
    if (outputs.note) {
      noteEl.innerHTML = markdownToHtml(outputs.note);
    } else {
      noteEl.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><div>note用の出力なし</div></div>';
    }

    // MD
    document.getElementById('md-preview').textContent = outputs.md || '（Markdown出力なし）';
  }

  // ===== COPY =====
  async function copyOutput(type) {
    const text = outputs[type];
    if (!text) { showToast('⚠️ コピーするものがありません'); return; }
    try {
      await navigator.clipboard.writeText(text);
      showToast('📋 コピーしました！');
    } catch {
      showToast('❌ コピーに失敗しました');
    }
  }

  // ===== UTILS =====
  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function markdownToHtml(md) {
    return md
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3 style="font-size:13px;font-weight:700;margin:10px 0 4px">$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^[-*] (.+)$/gm, '<li style="margin-left:16px;margin-bottom:2px">$1</li>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(?!<[hlp])/gm, '')
      || md;
  }

  // ===== INIT =====
  loadApiKey();
  renderMemos();
</script>
</body>
</html>
